<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Simple Interest Calculator</h2>

        <label>Principal:</label>
        <input type="number" id="principal" placeholder="Enter principal amount">

        <label>Rate:</label>
        <input type="number" id="rate" placeholder="Enter rate of interest">

        <label>Time:</label>
        <input type="number" id="time" placeholder="Enter time period">

        <button onclick="calculateSI()">Calculate</button>

        <h3 id="result"></h3>
    </div>

    <script src="main.jsx"></script>
</body>
</html>
